name: Tests

on:
  push:
    branches: [main, semi_produccion]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, zip, gd, bcmath, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Las vistas usan @vite: los tests que renderizan Blade necesitan el manifest
      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: php artisan test
