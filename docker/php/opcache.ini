; Opcache para desarrollo local: cachea opcodes pero revalida cada request,
; así los cambios en el código se ven al instante.
; En producción cambiar a: opcache.validate_timestamps=0 (y reiniciar php-fpm en cada deploy)
opcache.enable=1
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
