services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nexo

  app:
    user: "1000:1000"
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexo

  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-crm_nexo}
      MARIADB_USER: ${DB_USERNAME:-nexo}
      MARIADB_PASSWORD: ${DB_PASSWORD:-nexo_pass}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks:
      - nexo

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - nexo

  # Solo para compilar assets: no arranca con `up`, se usa bajo demanda:
  #   docker compose run --rm node npm install
  #   docker compose run --rm node npm run build
  node:
    image: node:22-alpine
    working_dir: /var/www/html
    user: "1000:1000"
    volumes:
      - ./:/var/www/html
    profiles:
      - assets
    networks:
      - nexo

networks:
  nexo:

volumes:
  dbdata:
